global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 说明：go 服务运行在宿主机上，Prometheus 在容器内，
# 通过 host.docker.internal 抓取宿主机上各服务暴露的 /metrics。
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-api'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'user-api'
    static_configs:
      - targets: ['host.docker.internal:9101']

  - job_name: 'user-rpc'
    static_configs:
      - targets: ['host.docker.internal:9102']

  - job_name: 'notification-rpc'
    static_configs:
      - targets: ['host.docker.internal:9103']

  - job_name: 'product-rpc'
    static_configs:
      - targets: ['host.docker.internal:9104']

  - job_name: 'order-rpc'
    static_configs:
      - targets: ['host.docker.internal:9105']

  - job_name: 'payment-rpc'
    static_configs:
      - targets: ['host.docker.internal:9106']
